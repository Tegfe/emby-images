name: 合并多地区IP到all.txt
on:
  workflow_dispatch:
  # 每小时整点执行
  schedule:
    - cron: '0 * * * *'

jobs:
  merge-ip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 下载并合并所有IP文件到all.txt
        run: |
          # 先清空
          > all.txt
          # 逐个下载追加到 all.txt
          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Cfxyz.txt >> all.txt
          echo "" >> all.txt

          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/US.txt >> all.txt
          echo "" >> all.txt

          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/SG.txt >> all.txt
          echo "" >> all.txt

          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/NL.txt >> all.txt
          echo "" >> all.txt

          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/DE.txt >> all.txt
          echo "" >> all.txt

          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/JP.txt >> all.txt

      - name: 提交推送
        uses: EndBug/add-and-commit@v9
        with:
          message: "每小时自动合并 Cfxyz/US/SG/NL/DE/JP 到 all.txt"
          committer_name: GitHub Actions
          committer_email: actions@github.com
          add: all.txt
