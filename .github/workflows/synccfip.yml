name: 合并+格式转换+去重IP到all.txt（每小时更新）
on:
  workflow_dispatch:
  schedule:
    - cron: '5 */8 * * *'

jobs:
  merge-ip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载合并所有IP文件
        run: |
          rm -f all.txt raw.txt
          touch raw.txt

          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/main/Cfxyz.txt >> raw.txt
          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/main/US.txt >> raw.txt
          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/main/SG.txt >> raw.txt
          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/main/NL.txt >> raw.txt
          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/main/DE.txt >> raw.txt
          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/main/JP.txt >> raw.txt

          awk '!seen[$0]++' raw.txt > raw_unique.txt

      - name: 批量转换IP格式（测速改为日本Fast）
        run: |
          input=raw_unique.txt
          output=all.txt
          rm -f $output

          # 测速节点 → 日本Fast 自动编号
          fast_cnt=1
          us_cnt=1
          sg_cnt=1
          nl_cnt=1
          de_cnt=1
          jp_cnt=1

          while IFS= read -r line; do
            [[ -z "$line" ]] && continue

            if echo "$line" | grep -q "【测速 Nodes】"; then
              ip=$(echo "$line" | cut -d# -f1)
              speed=$(echo "$line" | awk -F'】' '{print $2}' | xargs)
              # 重点修改：测速 → 日本Fast
              echo "${ip}#日本Fast${fast_cnt}-CF ${speed}" >> $output
              fast_cnt=$((fast_cnt+1))
            elif echo "$line" | grep -q "#us"; then
              ip=$(echo "$line" | cut -d# -f1)
              echo "${ip}#美国${us_cnt}-CF" >> $output
              us_cnt=$((us_cnt+1))
            elif echo "$line" | grep -q "#sg"; then
              ip=$(echo "$line" | cut -d# -f1)
              echo "${ip}#新加坡${sg_cnt}-CF" >> $output
              sg_cnt=$((sg_cnt+1))
            elif echo "$line" | grep -q "#nl"; then
              ip=$(echo "$line" | cut -d# -f1)
              echo "${ip}#荷兰${nl_cnt}-CF" >> $output
              nl_cnt=$((nl_cnt+1))
            elif echo "$line" | grep -q "#de"; then
              ip=$(echo "$line" | cut -d# -f1)
              echo "${ip}#德国${de_cnt}-CF" >> $output
              de_cnt=$((de_cnt+1))
            elif echo "$line" | grep -q "#jp"; then
              ip=$(echo "$line" | cut -d# -f1)
              echo "${ip}#日本${jp_cnt}-CF" >> $output
              jp_cnt=$((jp_cnt+1))
            else
              echo "$line" >> $output
            fi
          done < "$input"

      - name: 提交更新
        uses: EndBug/add-and-commit@v9
        with:
          message: "IP合并+自动格式转换 测速节点改为日本Fast 每小时更新"
          committer_name: GitHub Actions
          committer_email: actions@github.com
          add: all.txt
          push: true
