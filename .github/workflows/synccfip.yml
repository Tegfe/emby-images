name: 合并所有IP到all.txt（每小时更新）
on:
  workflow_dispatch:
  schedule:
    - cron: '25 * * * *'  # 每小时自动运行

jobs:
  merge-ip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载并合并所有IP到 all.txt
        run: |
          rm -f all.txt
          touch all.txt

          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/main/Cfxyz.txt >> all.txt
          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/main/US.txt >> all.txt
          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/main/SG.txt >> all.txt
          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/main/NL.txt >> all.txt
          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/main/DE.txt >> all.txt
          curl -fsSL https://raw.githubusercontent.com/gslege/CloudflareIP/main/JP.txt >> all.txt

      - name: 提交更新
        uses: EndBug/add-and-commit@v9
        with:
          message: "IP列表每小时自动更新"
          committer_name: GitHub Actions
          committer_email: actions@github.com
          add: all.txt
          push: true
