name: 同步Cloudflare IP列表

on:
  # 手动触发
  workflow_dispatch:
  # 定时触发（每天UTC 0点，可自行修改）
  schedule:
    - cron: '0 0 * * *'
  # 源仓库更新时触发（可选）
  push:
    branches: [ main ]

jobs:
  sync-ip-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: 检出目标仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 下载源IP文件
        run: |
          curl -L "https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Cfxyz.txt" -o source.txt

      - name: 覆盖写入all.txt
        run: |
          cat source.txt > all.txt

      - name: 提交并推送更改
        uses: EndBug/add-and-commit@v9
        with:
          message: "自动同步最新Cloudflare IP列表"
          committer_name: GitHub Actions
          committer_email: actions@github.com
          add: "all.txt"
