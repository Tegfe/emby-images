name: 自动同步 Emby 图标 + 自动生成 icons.json
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 自动下载图片 + 自动生成 icons.json
        run: |
          python -c '
          import json
          import requests
          import base64
          import os

          JSON_URL = "https://emby-icon.vercel.app/TF-EMBY.json"
          GITHUB_TOKEN = "${{ secrets.GITHUB_TOKEN }}"
          REPO = "Tegfe/emby-images"
          BASE_URL = "https://raw.githubusercontent.com/Tegfe/emby-images/main/images"

          print("正在拉取最新图标列表...")
          data = requests.get(JSON_URL, timeout=15).json()
          icons_data = data.get("icons", [])

          new_icons = []
          for icon in icons_data:
              try:
                  name = icon.get("name", "")
                  url = icon.get("url", "")
                  if not name or not url:
                      continue

                  filename = url.split("/")[-1]
                  github_url = f"{BASE_URL}/{filename}"

                  new_icons.append({
                      "name": name,
                      "url": github_url
                  })

                  resp = requests.get(url, timeout=10)
                  resp.raise_for_status()

                  b64 = base64.b64encode(resp.content).decode()
                  payload = {
                      "message": f"Sync {filename}",
                      "content": b64
                  }
                  headers = {
                      "Authorization": f"Bearer {GITHUB_TOKEN}",
                      "Accept": "application/vnd.github.v3+json"
                  }
                  upload_url = f"https://api.github.com/repos/{REPO}/contents/images/{filename}"
                  requests.put(upload_url, json=payload, headers=headers)
              except:
                  pass

          # 这里已经改成 MyEmby 啦！
          final_json = {
              "id": "MyEmby",
              "name": "MyEmby",
              "author": "Tegfe",
              "version": "1.0",
              "description": "MyEmby 全自动更新图标包",
              "icons": new_icons
          }

          with open("icons.json", "w", encoding="utf-8") as f:
              json.dump(final_json, f, ensure_ascii=False, indent=2)

          print("✅ 图片同步完成")
          print("✅ icons.json 已自动生成最新版（名字：MyEmby）")
          '

      - name: 提交更新到 GitHub
        run: |
          git config --global user.name "Tegfe"
          git config --global user.email "129144436+Tegfe@users.noreply.github.com"
          git add .
          git commit -m "Auto sync images + update icons.json" || true
          git push
