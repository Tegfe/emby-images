name: 自动同步 MyEmby 图标包
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 自动生成 icons.json (MyEmby)
        run: |
          python -c '
          import json
          import os

          IMAGE_FOLDER = "images"
          BASE_URL = "https://raw.githubusercontent.com/Tegfe/emby-images/main/images"

          icons = []
          for filename in os.listdir(IMAGE_FOLDER):
              if filename.lower().endswith((".png", ".jpg", ".jpeg")):
                  name = os.path.splitext(filename)[0]
                  url = f"{BASE_URL}/{filename}"
                  icons.append({"name": name, "url": url})

          final_json = {
              "id": "MyEmby",
              "name": "MyEmby",
              "author": "Tegfe",
              "version": "1.0",
              "description": "MyEmby 全自动更新图标包",
              "icons": icons
          }

          with open("icons.json", "w", encoding="utf-8") as f:
              json.dump(final_json, f, ensure_ascii=False, indent=2)

          print("✅ MyEmby 图标包生成完成！")
          '

      - name: 提交更新
        run: |
          git config --global user.name "Tegfe"
          git config --global user.email "129144436+Tegfe@users.noreply.github.com"
          git add .
          git commit -m "Update MyEmby icons.json" || true
          git push
