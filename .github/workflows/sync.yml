name: MyEmby 自动下载图标 + 生成图标包
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 拉取最新代码
        run: git pull

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 下载双图标源 + 合并生成 MyEmby 图标包
        run: |
          python -c '
          import json
          import requests
          import base64
          import os

          GITHUB_TOKEN = "${{ secrets.GITHUB_TOKEN }}"
          REPO = "Tegfe/emby-images"
          IMAGE_PREFIX = "https://raw.githubusercontent.com/Tegfe/emby-images/main/images/"

          JSON_URLS = [
              "https://emby-icon.vercel.app/TFEL-Emby.json",
              "https://emby-icon.vercel.app/TFEL-Avatar.json"
          ]

          all_icons = []
          downloaded_files = set()

          for JSON_URL in JSON_URLS:
              try:
                  print(f"正在拉取: {JSON_URL}")
                  data = requests.get(JSON_URL, timeout=20).json()
                  icons = data.get("icons", [])

                  for item in icons:
                      try:
                          name = item.get("name")
                          url = item.get("url")
                          if not name or not url:
                              continue

                          filename = url.split("/")[-1].split("?")[0]
                          name_raw, ext = os.path.splitext(filename)
                          counter = 1
                          new_filename = filename

                          while new_filename in downloaded_files:
                              new_filename = f"{name_raw}_{counter}{ext}"
                              counter += 1

                          downloaded_files.add(new_filename)
                          path = f"images/{new_filename}"
                          github_url = IMAGE_PREFIX + new_filename

                          resp = requests.get(url, timeout=15)
                          resp.raise_for_status()

                          payload = {
                              "message": f"Sync {new_filename}",
                              "content": base64.b64encode(resp.content).decode()
                          }
                          headers = {
                              "Authorization": f"Bearer {GITHUB_TOKEN}",
                              "Accept": "application/vnd.github.v3+json"
                          }
                          upload_url = f"https://api.github.com/repos/{REPO}/contents/{path}"
                          requests.put(upload_url, json=payload, headers=headers)

                          all_icons.append({
                              "name": name,
                              "url": github_url
                          })
                      except:
                          pass
              except:
                  pass

          final_json = {
              "id": "MyEmby",
              "name": "MyEmby",
              "author": "Tegfe",
              "version": "1.0",
              "description": "MyEmby 全自动更新图标包（双源合并）",
              "icons": all_icons
          }

          with open("icons.json", "w", encoding="utf-8") as f:
              json.dump(final_json, f, ensure_ascii=False, indent=2)

          print(f"\n✅ 全部完成！总计图标: {len(all_icons)}")
          '

      - name: 提交更新
        run: |
          git config --global user.name "Tegfe"
          git config --global user.email "129144436+Tegfe/users.noreply.github.com"
          git add .
          git commit -m "Auto update MyEmby icons" || true
          git push
