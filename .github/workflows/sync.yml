name: MyEmby 自动下载图标 + 生成图标包
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 下载多图标源 + 合成 MyEmby 图标包
        run: |
          python -c '
          import json
          import requests
          import base64
          import os
          from datetime import datetime, timedelta

          # 配置
          GITHUB_TOKEN = "${{ secrets.GITHUB_TOKEN }}"
          REPO = "Tegfe/emby-images"
          RAW_URL = "https://raw.githubusercontent.com/Tegfe/emby-images/main/images/"
          # 你要加的前缀
          URL_PREFIX = "https://hk.gh-proxy.org/"
          headers = {
              "Authorization": f"Bearer {GITHUB_TOKEN}",
              "Accept": "application/vnd.github.v3+json"
          }

          # 自动获取东八区时间（北京时间）
          beijing_time = (datetime.utcnow() + timedelta(hours=8)).strftime("%Y-%m-%d %H:%M")

          # 图标源列表
          SOURCES = [
              "https://emby-icon.vercel.app/TFEL-Avatar.json",
              "https://emby-icon.vercel.app/TFEL-Emby.json",
              "https://raw.githubusercontent.com/ginibond/ginibond/main/Icons/Forward/tubiao.json"
          ]

          all_icons = []
          exist_files = set()

          # 遍历下载
          for url in SOURCES:
              try:
                  data = requests.get(url, timeout=20).json()
                  for item in data.get("icons", []):
                      try:
                          name = item.get("name")
                          img_url = item.get("url")
                          if not name or not img_url:
                              continue

                          # 处理文件名
                          fn = img_url.split("/")[-1].split("?")[0]
                          name_only, ext = os.path.splitext(fn)
                          new_fn = fn
                          i = 1
                          while new_fn in exist_files:
                              new_fn = f"{name_only}_{i}{ext}"
                              i += 1
                          exist_files.add(new_fn)

                          # 下载图片
                          r = requests.get(img_url, timeout=15)
                          r.raise_for_status()

                          # 上传图片到 GitHub
                          payload = {
                              "message": f"Sync {new_fn}",
                              "content": base64.b64encode(r.content).decode()
                          }
                          upload = f"https://api.github.com/repos/{REPO}/contents/images/{new_fn}"
                          resp = requests.put(upload, json=payload, headers=headers)

                          # 加入列表 + 自动加前缀
                          all_icons.append({
                              "name": name,
                              "url": URL_PREFIX + RAW_URL + new_fn
                          })
                      except Exception as e:
                          print(f"处理单个图标失败: {e}")
                          pass
              except Exception as e:
                  print(f"拉取源失败: {e}")
                  pass

          # ====================== 排序规则：字母在前，数字在后 ======================
          def sort_key(item):
              name = item["name"].lower()
              if name and name[0].isdigit():
                  return (2, name)
              else:
                  return (1, name)

          all_icons.sort(key=sort_key)

          # 生成最终 JSON
          final_json = {
              "id": "MyEmby",
              "name": "MyEmby",
              "author": "Tegfe",
              "version": "1.0",
              "description": f"MyEmby 聚合图标包 更新时间：{beijing_time}",
              "icons": all_icons
          }
          json_content = json.dumps(final_json, ensure_ascii=False, indent=2)

          # 上传 icons.json
          json_upload_url = f"https://api.github.com/repos/{REPO}/contents/icons.json"
          
          sha = None
          try:
              resp = requests.get(json_upload_url, headers=headers)
              if resp.status_code == 200:
                  sha = resp.json().get("sha")
          except:
              pass

          payload_json = {
              "message": f"Update icons.json {beijing_time}",
              "content": base64.b64encode(json_content.encode("utf-8")).decode()
          }
          if sha:
              payload_json["sha"] = sha

          resp = requests.put(json_upload_url, json=payload_json, headers=headers)
          
          print(f"✅ 同步完成！总计 {len(all_icons)} 个图标")
          print(f"⏰ 更新时间：{beijing_time}")
          print(f"📄 icons.json 上传状态码: {resp.status_code}")
          '
