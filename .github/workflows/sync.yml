name: 自动同步 Emby 图标
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 自动下载并上传到 GitHub
        run: |
          python -c '
          import json
          import requests
          import base64

          JSON_URL = "https://emby-icon.vercel.app/TFEL-Emby.json"
          GITHUB_TOKEN = "${{ secrets.GITHUB_TOKEN }}"
          REPO = "Tegfe/emby-images"

          print("正在拉取图标列表...")
          data = requests.get(JSON_URL, timeout=15).json()
          images = [item["url"] for item in data.get("icons", []) if item.get("url")]

          print(f"找到 {len(images)} 张图片，开始同步...")

          for url in images:
              try:
                  filename = url.split("/")[-1].split("?")[0]
                  path = f"images/{filename}"

                  resp = requests.get(url, timeout=10)
                  resp.raise_for_status()

                  b64 = base64.b64encode(resp.content).decode()
                  payload = {
                      "message": f"Sync {filename}",
                      "content": b64
                  }
                  headers = {
                      "Authorization": f"Bearer {GITHUB_TOKEN}",
                      "Accept": "application/vnd.github.v3+json"
                  }
                  upload_url = f"https://api.github.com/repos/{REPO}/contents/{path}"
                  requests.put(upload_url, json=payload, headers=headers)
              except:
                  pass
          print("✅ 同步完成！")
          '
