name: MyEmby 自动下载图标 + 生成图标包
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 下载图标 + 自动生成 MyEmby 图标包
        run: |
          python -c '
          import json
          import requests
          import base64
          import os

          # 源地址
          JSON_URL = "https://emby-icon.vercel.app/TFEL-Emby.json"
          GITHUB_TOKEN = "${{ secrets.GITHUB_TOKEN }}"
          REPO = "Tegfe/emby-images"
          IMAGE_PREFIX = "https://raw.githubusercontent.com/Tegfe/emby-images/main/images/"

          # 1. 拉取图标列表
          print("正在拉取图标列表...")
          data = requests.get(JSON_URL, timeout=15).json()
          icons = data.get("icons", [])

          new_icons = []

          # 2. 下载图片到 GitHub
          for item in icons:
              try:
                  name = item.get("name")
                  url = item.get("url")
                  if not name or not url:
                      continue

                  filename = url.split("/")[-1].split("?")[0]
                  path = f"images/{filename}"
                  github_url = IMAGE_PREFIX + filename

                  new_icons.append({
                      "name": name,
                      "url": github_url
                  })

                  resp = requests.get(url, timeout=10)
                  resp.raise_for_status()

                  payload = {
                      "message": f"Sync {filename}",
                      "content": base64.b64encode(resp.content).decode()
                  }
                  headers = {
                      "Authorization": f"Bearer {GITHUB_TOKEN}",
                      "Accept": "application/vnd.github.v3+json"
                  }
                  upload_url = f"https://api.github.com/repos/{REPO}/contents/{path}"
                  requests.put(upload_url, json=payload, headers=headers)
              except:
                  pass

          # 3. 生成 MyEmby 图标包 JSON
          final_json = {
              "id": "MyEmby",
              "name": "MyEmby",
              "author": "Tegfe",
              "version": "1.0",
              "description": "MyEmby 全自动更新图标包",
              "icons": new_icons
          }

          with open("icons.json", "w", encoding="utf-8") as f:
              json.dump(final_json, f, ensure_ascii=False, indent=2)

          print("✅ 图片同步完成")
          print("✅ MyEmby 图标包已生成")
          '

      - name: 提交更新
        run: |
          git config --global user.name "Tegfe"
          git config --global user.email "129144436+Tegfe@users.noreply.github.com"
          git add .
          git commit -m "Auto update MyEmby icons" || true
          git push
