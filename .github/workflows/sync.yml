name: Sync Emby Icons

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run Sync Script
        run: |
          python << 'EOF'
          import json
          import requests
          import base64
          import os
          import re
          import hashlib
          import time
          from datetime import datetime, timedelta
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from threading import Lock

          # ===================== 配置 =====================
          GITHUB_TOKEN = os.environ.get("GITHUB_TOKEN")
          REPO = "Tegfe/emby-images"
          RAW_URL = "https://raw.githubusercontent.com/Tegfe/emby-images/main/images/"

          headers = {
              "Authorization": f"token {GITHUB_TOKEN}",
              "Accept": "application/vnd.github.v3+json"
          }

          MAX_WORKERS = 5

          # ===================== 时间 =====================
          beijing_time = (datetime.utcnow() + timedelta(hours=8)).strftime("%Y-%m-%d %H:%M")

          # ===================== 图标源 =====================
          SOURCES = [
              "https://emby-icon.vercel.app/TFEL-Avatar.json",
              "https://emby-icon.vercel.app/TFEL-Emby.json",
              "https://raw.githubusercontent.com/ginibond/ginibond/main/Icons/Forward/tubiao.json",
              "https://raw.githubusercontent.com/sooyaaabo/IconLibrary/main/Emby-Icon.json"
          ]

          all_icons = []
          exist_files = set()
          lock = Lock()

          # ===================== 预加载 GitHub 文件 =====================
          repo_files = {}
          try:
              api_url = f"https://api.github.com/repos/{REPO}/contents/images"
              resp = requests.get(api_url, headers=headers)
              if resp.status_code == 200:
                  for f in resp.json():
                      repo_files[f["name"]] = f["sha"]
          except Exception as e:
              print(f"⚠️ 获取仓库文件失败: {e}")

          # ===================== 排序函数 =====================
          def sort_key(item):
              name = (item.get("name") or "").lower()
              is_digit = name[0].isdigit() if name else False
              return (
                  0 if is_digit else 1,
                  [int(t) if t.isdigit() else t for t in re.split(r"(\d+)", name)]
              )

          # ===================== 处理单个图标 =====================
          def process_icon(item):
              try:
                  name = item.get("name")
                  img_url = item.get("url")
                  if not name or not img_url:
                      return None

                  fn = img_url.split("/")[-1].split("?")[0]
                  name_only, ext = os.path.splitext(fn)

                  with lock:
                      new_fn = fn
                      i = 1
                      while new_fn in exist_files:
                          new_fn = f"{name_only}_{i}{ext}"
                          i += 1
                      exist_files.add(new_fn)

                  r = requests.get(img_url, timeout=15)
                  r.raise_for_status()
                  new_sha = hashlib.sha1(r.content).hexdigest()
                  remote_sha = repo_files.get(new_fn)
                  upload_url = f"https://api.github.com/repos/{REPO}/contents/images/{new_fn}"

                  if remote_sha == new_sha:
                      print(f"⏭️ 跳过: {new_fn}")
                  else:
                      payload = {
                          "message": f"Sync {new_fn}",
                          "content": base64.b64encode(r.content).decode()
                      }
                      if remote_sha:
                          payload["sha"] = remote_sha

                      for attempt in range(3):
                          res = requests.put(upload_url, json=payload, headers=headers)
                          if res.status_code not in (429, 500):
                              break
                          time.sleep(2 ** attempt)

                      print(f"✅ 更新: {new_fn}")

                  return {
                      "name": name,
                      "url": RAW_URL + new_fn
                  }

              except Exception as e:
                  print(f"⚠️ 处理失败: {e}")
                  return None

          # ===================== 收集任务 =====================
          tasks = []
          for url in SOURCES:
              try:
                  data = requests.get(url, timeout=20).json()
                  tasks.extend(data.get("icons", []))
              except Exception as e:
                  print(f"⚠️ 拉取源失败: {e}")

          # ===================== 并发执行 =====================
          with ThreadPoolExecutor(max_workers=MAX_WORKERS) as executor:
              futures = [executor.submit(process_icon, item) for item in tasks]
              for future in as_completed(futures):
                  result = future.result()
                  if result:
                      all_icons.append(result)

          # ===================== 排序 =====================
          all_icons.sort(key=sort_key)

          # ===================== 生成 JSON =====================
          final_json = {
              "id": "MyEmby",
              "name": "MyEmby",
              "author": "Tegfe",
              "version": "1.0",
              "description": f"MyEmby 聚合图标包 更新时间：{beijing_time}",
              "icons": all_icons
          }

          json_content = json.dumps(final_json, ensure_ascii=False, indent=2)

          # ===================== 上传 icons.json =====================
          json_url = f"https://api.github.com/repos/{REPO}/contents/icons.json"
          sha = None
          try:
              resp = requests.get(json_url, headers=headers)
              if resp.status_code == 200:
                  sha = resp.json().get("sha")
          except:
              pass

          payload = {
              "message": f"Update icons.json {beijing_time}",
              "content": base64.b64encode(json_content.encode()).decode()
          }
          if sha:
              payload["sha"] = sha

          resp = None
          for attempt in range(5):
              try:
                  resp = requests.put(json_url, json=payload, headers=headers, timeout=15)
                  if resp.status_code in (200, 201):
                      break
                  time.sleep(3 ** attempt)
              except Exception as e:
                  print(f"重试 {attempt+1} 失败: {e}")
                  time.sleep(3 ** attempt)

          # ===================== 输出 =====================
          print("="*50)
          print(f"✅ 完成，总图标: {len(all_icons)}")
          print(f"⚡ 并发线程: {MAX_WORKERS}")
          print(f"⏰ 更新时间: {beijing_time}")
          if resp:
              print(f"📄 状态码: {resp.status_code}")
          else:
              print(f"📄 状态码: 请求异常")
          print("="*50)
          EOF
        shell: /usr/bin/bash -e {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
